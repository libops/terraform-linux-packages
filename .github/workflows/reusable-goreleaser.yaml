name: reusable-goreleaser

on:
  workflow_call:
    inputs:
      go-version:
        required: false
        type: string
        default: ">=1.25.8"
      goreleaser-args:
        required: false
        type: string
        default: "release --clean"
      publish-package-repo:
        required: false
        type: boolean
        default: false
      package-name:
        required: false
        type: string
        default: ""
      package-repo-prefix:
        required: false
        type: string
        default: ""
      package-repo-label:
        required: false
        type: string
        default: ""
      package-public-key-name:
        required: false
        type: string
        default: ""
      excluded-package-names:
        description: Additional comma- or whitespace-separated package names removed alongside publisher-mandatory exclusions
        required: false
        type: string
        default: ""
      gcp-project:
        required: false
        type: string
        default: ""
      workload-identity-provider:
        required: false
        type: string
        default: ""
      service-account:
        required: false
        type: string
        default: ""
      gcs-bucket:
        required: false
        type: string
        default: ""
      aptly-gpg-key-id:
        required: false
        type: string
        default: ""
      aptly-gpg-private-key-secret:
        required: false
        type: string
        default: "aptly-gpg-private-key"
      aptly-gpg-passphrase-secret:
        required: false
        type: string
        default: "aptly-gpg-passphrase"

permissions: {}

jobs:
  goreleaser:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ inputs.go-version }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          # Keep source-release and cross-repository publication credentials
          # independently scoped.
          version: v2.17.0
          args: ${{ inputs.goreleaser-args }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_REPO_TOKEN: ${{ secrets.HOMEBREW_REPO }}

  publish-linux-packages:
    needs: goreleaser
    if: ${{ inputs.publish-package-repo }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Package Publisher
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ job.workflow_repository }}
          # Use the exact commit that defines this called job. Checkout happens
          # after caller-controlled release hooks so the credentialed publisher
          # cannot be dirtied or replaced before it runs.
          ref: ${{ job.workflow_sha }}
          path: .libops-packages
          persist-credentials: false

      - name: Validate Linux package exclusions
        shell: bash
        working-directory: .libops-packages
        env:
          PACKAGE_NAME: ${{ inputs.package-name }}
          EXCLUDED_PACKAGE_NAMES: ${{ inputs.excluded-package-names }}
        run: bash scripts/validate-package-exclusions.sh

      - name: Build exact package tools image
        id: package-tools
        shell: bash
        working-directory: .libops-packages
        env:
          PACKAGE_PUBLISHER_SHA: ${{ job.workflow_sha }}
        run: |
          set -euo pipefail
          if [[ ! "$PACKAGE_PUBLISHER_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "publisher workflow SHA must be an exact lowercase commit ID" >&2
            exit 1
          fi
          actual_sha="$(git rev-parse HEAD)"
          if [[ "$actual_sha" != "$PACKAGE_PUBLISHER_SHA" ]]; then
            echo "package publisher checkout does not match the workflow SHA" >&2
            exit 1
          fi
          image="libops/terraform-linux-packages:publisher-${PACKAGE_PUBLISHER_SHA}"
          docker build --tag "$image" .
          image_id="$(docker image inspect --format '{{.Id}}' "$image")"
          if [[ ! "$image_id" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "exact package-tools build did not produce a canonical image ID" >&2
            exit 1
          fi
          {
            echo "image=$image"
            echo "image-id=$image_id"
          } >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ inputs.workload-identity-provider }}
          service_account: ${{ inputs.service-account }}
          create_credentials_file: true

      - name: Publish Linux package repository
        shell: bash
        working-directory: .libops-packages
        env:
          GH_TOKEN: ${{ github.token }}
          GCLOUD_PROJECT: ${{ inputs.gcp-project }}
          GCS_BUCKET: ${{ inputs.gcs-bucket }}
          APTLY_GPG_KEY_ID: ${{ inputs.aptly-gpg-key-id }}
          APTLY_GPG_PRIVATE_KEY_SECRET: ${{ inputs.aptly-gpg-private-key-secret }}
          APTLY_GPG_PASSPHRASE_SECRET: ${{ inputs.aptly-gpg-passphrase-secret }}
          APTLY_LABEL: ${{ inputs.package-repo-label }}
          APTLY_PUBLIC_KEY_NAME: ${{ inputs.package-public-key-name }}
          EXCLUDED_PACKAGE_NAMES: ${{ inputs.excluded-package-names }}
          GCS_BUCKET_PREFIX: ${{ inputs.package-repo-prefix }}
          LOCK_TIMEOUT_SECONDS: "7200"
          PACKAGE_NAME: ${{ inputs.package-name }}
          RELEASE_VERSION: ${{ github.ref_name }}
          PACKAGE_TOOLS_IMAGE: ${{ steps.package-tools.outputs.image }}
          EXPECTED_PACKAGE_TOOLS_IMAGE_ID: ${{ steps.package-tools.outputs.image-id }}
          PACKAGE_PUBLISHER_SHA: ${{ job.workflow_sha }}
        run: bash scripts/publish-release-from-environment.sh
