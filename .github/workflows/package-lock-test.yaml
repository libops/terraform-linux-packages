name: package-lock-test

on:
  pull_request:
    paths:
      - "Makefile"
      - "scripts/download-release-assets.sh"
      - "scripts/package-exclusions.sh"
      - "scripts/publish-package-repo.sh"
      - "scripts/publish-release-from-environment.sh"
      - "scripts/test-package-exclusion-validation.sh"
      - "scripts/test-publish-cache-control.sh"
      - "scripts/test-publish-environment.sh"
      - "scripts/test-publish-exclusions.sh"
      - "scripts/test-make-lock-env.sh"
      - "scripts/test-publish-lock.sh"
      - "scripts/validate-package-exclusions.sh"
      - ".github/workflows/package-lock-test.yaml"
  push:
    branches:
      - main
    paths:
      - "Makefile"
      - "scripts/download-release-assets.sh"
      - "scripts/package-exclusions.sh"
      - "scripts/publish-package-repo.sh"
      - "scripts/publish-release-from-environment.sh"
      - "scripts/test-package-exclusion-validation.sh"
      - "scripts/test-publish-cache-control.sh"
      - "scripts/test-publish-environment.sh"
      - "scripts/test-publish-exclusions.sh"
      - "scripts/test-make-lock-env.sh"
      - "scripts/test-publish-lock.sh"
      - "scripts/validate-package-exclusions.sh"
      - ".github/workflows/package-lock-test.yaml"

permissions:
  contents: read

concurrency:
  group: package-lock-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check shell syntax
        run: >-
          bash -n
          scripts/download-release-assets.sh
          scripts/package-exclusions.sh
          scripts/publish-package-repo.sh
          scripts/publish-release-from-environment.sh
          scripts/test-package-exclusion-validation.sh
          scripts/test-publish-cache-control.sh
          scripts/test-publish-environment.sh
          scripts/test-publish-exclusions.sh
          scripts/test-make-lock-env.sh
          scripts/test-publish-lock.sh
          scripts/test-publisher-allowlist.sh
          scripts/test-wif-workflow-allowlist.sh
          scripts/validate-package-exclusions.sh

      - name: Test package exclusion validation
        run: bash scripts/test-package-exclusion-validation.sh

      - name: Test persistent package exclusion
        run: bash scripts/test-publish-exclusions.sh

      - name: Test credentialed publication boundary
        run: bash scripts/test-publish-environment.sh

      - name: Test cache-control upload contract
        run: bash scripts/test-publish-cache-control.sh

      - name: Test lock handoff race
        run: bash scripts/test-publish-lock.sh

      - name: Test lock configuration forwarding
        run: bash scripts/test-make-lock-env.sh
